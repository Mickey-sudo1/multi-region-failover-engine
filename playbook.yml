---
- name: Configure Global Failover Web Servers
  hosts: all
  become: yes # This tells Ansible to run commands as 'sudo'
  tasks:
    - name: Update apt cache and install Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Ensure Apache is running and enabled on boot
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Deploy the custom website
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
          <body style="background-color: #0d1117; color: #58a6ff; text-align: center; padding: 10%; font-family: sans-serif;">
            <h1>Global Failover Engine is LIVE 🚀</h1>
            <p>This server was successfully provisioned by Terraform and configured by Ansible via GitHub Actions.</p>
          </body>
          </html>
