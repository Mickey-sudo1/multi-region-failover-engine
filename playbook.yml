---
- name: Configure Global Failover Web Servers
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache and install Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Ensure Apache is running and enabled
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Deploy the custom website
      shell: |
        echo "<body style='background-color:#1e1e1e; color:#00ff00; font-family:monospace; text-align:center; padding-top:20%;'>
        <h1>Global Failover Engine is LIVE !</h1>
        <h2>Currently serving from node: {{ inventory_hostname }}</h2>
        </body>" > /var/www/html/index.html
